<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kingdom Scraper{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .stat-card { border-left: 4px solid #0d6efd; }
        .badge-mieszkanie { background: #0d6efd; }
        .badge-dom       { background: #198754; }
        .badge-dzialka   { background: #ffc107; color: #000; }
        .badge-lokal     { background: #dc3545; }
        .badge-inne      { background: #6c757d; }
        .status-running  { color: #198754; font-weight: 600; }
        .status-stopped  { color: #dc3545; font-weight: 600; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">&#127968; Kingdom Scraper</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/control">Panel sterowania</a>
        </div>
    </div>
</nav>
<div class="container pb-5">
    {% block content %}{% endblock %}
</div>
</body>
</html>
