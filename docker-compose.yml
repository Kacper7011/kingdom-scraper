services:
  mongodb:
    build: ./database
    container_name: kingdom-mongodb
    volumes:
      - mongo-data:/data/db
    networks:
      - scraper-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: kingdom-redis
    volumes:
      - redis-data:/data
    networks:
      - scraper-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    container_name: kingdom-engine
    env_file: .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scraper-net
    restart: on-failure

  interface:
    build:
      context: .
      dockerfile: interface/Dockerfile
    container_name: kingdom-interface
    env_file: .env
    ports:
      - "${FLASK_PORT:-5000}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scraper-net
    restart: unless-stopped

networks:
  scraper-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
