services:
  mongodb:
    build: ./database
    container_name: kingdom-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - scraper-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: kingdom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - scraper-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build: ./engine
    container_name: kingdom-engine
    env_file: .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scraper-net
    volumes:
      - ./shared:/app/shared:ro

  interface:
    build: ./interface
    container_name: kingdom-interface
    env_file: .env
    ports:
      - "${FLASK_PORT:-5000}:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scraper-net
    volumes:
      - ./shared:/app/shared:ro

networks:
  scraper-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
